name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run tests (includes data-integrity gate tests)
        run: python -m pytest tests/ -v
      - name: Compile all modules
        run: python -m compileall -q src tests run_fukui_pipeline.py
